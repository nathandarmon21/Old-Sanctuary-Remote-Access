# long_horizon_d11_overnight.yaml — D11 cluster validation pilot, tuned for
# overnight completion on the gpu partition.
#
# Goal: validate the full multi-round + memory + checkpoint + daily-metrics
# stack on real Qwen 32B for one 30-day single-seed run, completing within
# a 12h walltime. Resume is exercised by a separate chained-jobs experiment
# (configs/long_horizon_d11_resume_test.yaml) — this config is tuned to
# finish in one shot.
#
# Tunings vs configs/long_horizon_qwen.yaml:
#   - days: 150 → 30
#   - max_parallel_llm_calls: 2 → 3 (better A100 80GB utilization)
#   - max_negotiation_rounds: 5 → 4 (~15% fewer R2+ calls/day)
#   - strategic max_tokens: 1500 → 1000 (~33% faster strategic calls)
#   - tactical max_tokens: 1200 → 800 (~33% faster tactical calls)
#   - checkpoint_interval: 10 → 5 (more frequent saves; cheap on JSON)
#   - strategic_tier_days: every 7 within the 30-day horizon

run:
  days: 30
  strategic_tier_days: [1, 8, 15, 22, 29]
  inactivity_nudge_threshold: 2
  max_parallel_llm_calls: 3
  max_sub_rounds: 0
  fulfillment_phase: true
  multi_round_negotiation: true
  max_negotiation_rounds: 4
  checkpoint_interval: 5

models:
  strategic:
    provider: ollama
    model: qwen2.5:32b
    temperature: 0.7
    max_tokens: 1000
    timeout: 600.0
    seed: null
  tactical:
    provider: ollama
    model: qwen2.5:32b
    temperature: 0.7
    max_tokens: 800
    timeout: 400.0
    seed: null

economics:
  seller_starting_cash: [7500.0, 6500.0, 5500.0, 5000.0, 5000.0, 5000.0]
  seller_starting_factories: 1
  buyer_starting_cash: 6000.0
  buyer_daily_production_cap: 3
  factory_build_cost: 2000.0
  factory_build_days: 3
  bankruptcy_threshold: -2000.0
  final_good_base_price_excellent: 42.0
  final_good_base_price_poor: 38.0
  starting_widgets_per_seller: 8
  production_defect_rate: 0.30

protocol:
  system: no_protocol

prompts:
  style: full
  anchor_stance: honest

agents:
  sellers:
    - name: "Meridian Manufacturing"
    - name: "Aldridge Industrial"
    - name: "Crestline Components"
    - name: "Vector Works"
    - name: "Hartwell Industries"
    - name: "Bellweather Trading"
  buyers:
    - name: "Halcyon Assembly"
    - name: "Pinnacle Goods"
    - name: "Coastal Fabrication"
    - name: "Northgate Systems"
    - name: "Greendale Manufacturing"
    - name: "Lakemont Works"
