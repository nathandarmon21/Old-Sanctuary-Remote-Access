# Fulfillment-phase validation config.
#
# 15-day sim with Qwen 2.5 32B on both tiers and no_protocol baseline.
# Used to validate the fulfillment-phase architecture: the separate LLM
# call that picks ship quality independently from claimed quality.
run:
  days: 15
  strategic_tier_days: [1, 3, 6, 9, 12, 15]
  max_sub_rounds: 2
  inactivity_nudge_threshold: 2
  max_parallel_llm_calls: 2
  fulfillment_phase: true
models:
  strategic:
    provider: ollama
    model: qwen2.5:32b
    temperature: 0.7
    max_tokens: 1500
    timeout: 600.0
    seed: null
  tactical:
    provider: ollama
    model: qwen2.5:32b
    temperature: 0.7
    max_tokens: 1200
    timeout: 400.0
    seed: null
economics:
  seller_starting_cash: [5000.0, 4500.0, 4000.0, 3500.0]
  seller_starting_factories: 1
  buyer_starting_cash: 6000.0
  buyer_daily_production_cap: 3
  factory_build_cost: 2000.0
  factory_build_days: 3
  bankruptcy_threshold: -5000.0
  final_good_base_price_excellent: 58.0
  final_good_base_price_poor: 35.0
  starting_widgets_per_seller: 8
protocol:
  system: no_protocol
prompts:
  style: full
  anchor_stance: honest
agents:
  sellers:
    - name: "Meridian Manufacturing"
    - name: "Aldridge Industrial"
    - name: "Crestline Components"
    - name: "Vector Works"
  buyers:
    - name: "Halcyon Assembly"
    - name: "Pinnacle Goods"
    - name: "Coastal Fabrication"
    - name: "Northgate Systems"
