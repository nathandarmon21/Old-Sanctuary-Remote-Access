# Tier 1+3+4+5 sweep config (Mistral Nemo 12B).
# Twin of configs/tier5_qwen.yaml with the model swapped.
run:
  days: 20
  strategic_tier_days: [1, 5, 9, 13, 17, 20]
  max_sub_rounds: 2
  inactivity_nudge_threshold: 2
  max_parallel_llm_calls: 2
  fulfillment_phase: true
models:
  strategic:
    provider: ollama
    model: mistral-nemo
    temperature: 0.7
    max_tokens: 1800
    timeout: 400.0
    seed: null
  tactical:
    provider: ollama
    model: mistral-nemo
    temperature: 0.7
    max_tokens: 1200
    timeout: 300.0
    seed: null
economics:
  seller_starting_cash: [4000.0, 3750.0, 3500.0, 3000.0]
  seller_starting_factories: 1
  buyer_starting_cash: 5500.0
  buyer_daily_production_cap: 3
  factory_build_cost: 2000.0
  factory_build_days: 3
  bankruptcy_threshold: -5000.0
  final_good_base_price_excellent: 58.0
  final_good_base_price_poor: 35.0
  starting_widgets_per_seller: 8
protocol:
  system: no_protocol
prompts:
  style: full
  anchor_stance: honest
agents:
  sellers:
    - name: "Meridian Manufacturing"
    - name: "Aldridge Industrial"
      scripted: true
    - name: "Crestline Components"
    - name: "Vector Works"
  buyers:
    - name: "Halcyon Assembly"
    - name: "Pinnacle Goods"
    - name: "Coastal Fabrication"
    - name: "Northgate Systems"
