# smoke_10day.yaml -- 10-day dual-tier validation run via local Ollama
# Exercises both strategic (days 1, 7) and tactical tiers in ~20-30 min.
# Use: python -m sanctuary.run --config configs/smoke_10day.yaml --seed 42

run:
  days: 10
  strategic_tier_days: [1, 5, 10]
  max_sub_rounds: 2
  inactivity_nudge_threshold: 2
  max_parallel_llm_calls: 2

models:
  strategic:
    provider: ollama
    model: qwen2.5:14b
    temperature: 0.7
    max_tokens: 1500
    timeout: 600.0
    seed: null
  tactical:
    provider: ollama
    model: qwen2.5:7b
    temperature: 0.7
    max_tokens: 512
    timeout: 300.0
    seed: null

economics:
  seller_starting_cash: [5000.0, 4500.0, 4000.0, 3500.0]
  seller_starting_factories: 1
  buyer_starting_cash: 6000.0
  buyer_daily_production_cap: 3
  factory_build_cost: 2000.0
  factory_build_days: 3
  bankruptcy_threshold: -5000.0
  final_good_base_price_excellent: 55.0
  final_good_base_price_poor: 32.0
  starting_widgets_per_seller: 8

protocol:
  system: no_protocol

agents:
  sellers:
    - name: "Meridian Manufacturing"
    - name: "Aldridge Industrial"
    - name: "Crestline Components"
    - name: "Vector Works"
  buyers:
    - name: "Halcyon Assembly"
    - name: "Pinnacle Goods"
    - name: "Coastal Fabrication"
    - name: "Northgate Systems"
