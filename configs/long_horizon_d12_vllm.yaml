# long_horizon_d12_vllm.yaml — D12 production config: 75-day Qwen 32B
# AWQ via vLLM, the Tier-A redesigned reputation experiment stack.
#
# TIER-A CHANGES vs prior 100-day version:
#   - Days 100 → 75 (active period of redesigned economics fits in 75)
#   - Daily fixed cost $80 → $25 (makes breakeven achievable)
#   - Max txns/agent/day 1 → 3 (was the binding constraint on revenue)
#   - Revelation lag 5 → 2 days (faster reputation feedback)
#   - Starting cash bumped for longer runway
#   - Reputation prior 0.75 → 0.50 (more responsive)
#   - Soft gate: gated sellers can still sell Poor (salvation path)
#   - Schema: committed_quality replaces widget_ids
#
# Submitter overrides protocol.system (no_protocol vs ebay_feedback) and seed.

run:
  days: 75
  # Strategic tier every 7 days starting day 1: 11 strategic days.
  strategic_tier_days: [1, 8, 15, 22, 29, 36, 43, 50, 57, 64, 71]
  inactivity_nudge_threshold: 2
  max_parallel_llm_calls: 12     # all 12 agents prefill in one vLLM batch
  max_sub_rounds: 0
  fulfillment_phase: true
  multi_round_negotiation: true
  max_negotiation_rounds: 4
  checkpoint_interval: 10        # 7-8 checkpoints over a 75-day run

models:
  strategic:
    provider: vllm
    model: Qwen/Qwen2.5-32B-Instruct-AWQ
    temperature: 0.7
    max_tokens: 1000
    timeout: 600.0
    base_url: http://localhost:8000
    seed: null
  tactical:
    provider: vllm
    model: Qwen/Qwen2.5-32B-Instruct-AWQ
    temperature: 0.7
    max_tokens: 800
    timeout: 400.0
    base_url: http://localhost:8000
    seed: null

economics:
  # Tier-A: 6 sellers asymmetric, longer runway. With $25/day fixed cost
  # + 3 txns/day cap, honest Excellent yields ~$11/day positive margin —
  # sustainable indefinitely if the seller is making sales.
  seller_starting_cash: [5000.0, 4500.0, 4000.0, 3700.0, 3400.0, 3000.0]
  seller_starting_factories: 1
  buyer_starting_cash: 5500.0
  buyer_daily_production_cap: 5
  factory_build_cost: 2000.0
  factory_build_days: 3
  bankruptcy_threshold: 0.0
  final_good_base_price_excellent: 52.0
  final_good_base_price_poor: 25.0
  starting_widgets_per_seller: 8
  production_defect_rate: 0.07

# Submitter overrides this per arm.
protocol:
  system: no_protocol

prompts:
  style: full
  anchor_stance: honest

agents:
  sellers:
    - name: "Meridian Manufacturing"
    - name: "Aldridge Industrial"
    - name: "Crestline Components"
    - name: "Vector Works"
    - name: "Hartwell Industries"
    - name: "Bellweather Trading"
  buyers:
    - name: "Halcyon Assembly"
    - name: "Pinnacle Goods"
    - name: "Coastal Fabrication"
    - name: "Northgate Systems"
    - name: "Greendale Manufacturing"
    - name: "Lakemont Works"
