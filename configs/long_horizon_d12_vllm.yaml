# long_horizon_d12_vllm.yaml — D12 production config: 150-day Qwen 32B
# AWQ via vLLM, all stack features (multi-round + memory + checkpoint +
# daily-metrics) wired up.
#
# This is the canonical config for the 20-run reputation-vs-no-protocol
# study. The submitter overrides protocol.system per arm (no_protocol vs
# ebay_feedback) and seed per replicate (10 seeds per arm).
#
# Walltime estimate from the v2 pilot's per-day pace: ~15-17 hours per
# 150-day run. Submitting with --time=24:00:00 on the gpu partition.

run:
  days: 150
  # Strategic tier every 7 days: [1, 8, 15, ..., 148] = 22 strategic days.
  strategic_tier_days: [1, 8, 15, 22, 29, 36, 43, 50, 57, 64, 71, 78, 85,
                       92, 99, 106, 113, 120, 127, 134, 141, 148]
  inactivity_nudge_threshold: 2
  max_parallel_llm_calls: 6      # vLLM continuous batching scales well
  max_sub_rounds: 0
  fulfillment_phase: true
  multi_round_negotiation: true
  max_negotiation_rounds: 4
  checkpoint_interval: 10        # 15 checkpoints over a 150-day run

models:
  strategic:
    provider: vllm
    model: Qwen/Qwen2.5-32B-Instruct-AWQ
    temperature: 0.7
    max_tokens: 1000
    timeout: 600.0
    base_url: http://localhost:8000
    seed: null
  tactical:
    provider: vllm
    model: Qwen/Qwen2.5-32B-Instruct-AWQ
    temperature: 0.7
    max_tokens: 800
    timeout: 400.0
    base_url: http://localhost:8000
    seed: null

economics:
  seller_starting_cash: [7500.0, 6500.0, 5500.0, 5000.0, 5000.0, 5000.0]
  seller_starting_factories: 1
  buyer_starting_cash: 6000.0
  buyer_daily_production_cap: 3
  factory_build_cost: 2000.0
  factory_build_days: 3
  bankruptcy_threshold: -2000.0
  final_good_base_price_excellent: 42.0
  final_good_base_price_poor: 38.0
  starting_widgets_per_seller: 8
  production_defect_rate: 0.30

# Submitter overrides this per arm.
protocol:
  system: no_protocol

prompts:
  style: full
  anchor_stance: honest

agents:
  sellers:
    - name: "Meridian Manufacturing"
    - name: "Aldridge Industrial"
    - name: "Crestline Components"
    - name: "Vector Works"
    - name: "Hartwell Industries"
    - name: "Bellweather Trading"
  buyers:
    - name: "Halcyon Assembly"
    - name: "Pinnacle Goods"
    - name: "Coastal Fabrication"
    - name: "Northgate Systems"
    - name: "Greendale Manufacturing"
    - name: "Lakemont Works"
