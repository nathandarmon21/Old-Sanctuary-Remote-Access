# long_horizon_d12_vllm.yaml — D12 production config: 100-day Qwen 32B
# AWQ via vLLM, the redesigned reputation experiment stack.
#
# REDESIGN CHANGES vs prior version:
#   - Day count 150 → 100 (full attractor formation by day 90)
#   - Defect rate 0.30 → 0.07 (Poor production becomes a deliberate choice,
#     not the dominant inventory state)
#   - Final-good prices 42/38 → 52/25 (creates real margin gradient:
#     V_E=$42, V_P=$15 buyer-side, with $30/$10 producer-side)
#   - Bankruptcy threshold -2000 → 0 (any insolvency = out)
#   - Starting cash tightened to make $80/day fixed-cost burn rate bite
#
# Submitter overrides protocol.system (no_protocol vs ebay_feedback) and seed.

run:
  days: 100
  # Strategic tier every 7 days starting day 1: 15 strategic days.
  strategic_tier_days: [1, 8, 15, 22, 29, 36, 43, 50, 57, 64, 71, 78, 85, 92, 99]
  inactivity_nudge_threshold: 2
  max_parallel_llm_calls: 12     # all 12 agents prefill in one vLLM batch
  max_sub_rounds: 0
  fulfillment_phase: true
  multi_round_negotiation: true
  max_negotiation_rounds: 4
  checkpoint_interval: 10        # 10 checkpoints over a 100-day run

models:
  strategic:
    provider: vllm
    model: Qwen/Qwen2.5-32B-Instruct-AWQ
    temperature: 0.7
    max_tokens: 1000
    timeout: 600.0
    base_url: http://localhost:8000
    seed: null
  tactical:
    provider: vllm
    model: Qwen/Qwen2.5-32B-Instruct-AWQ
    temperature: 0.7
    max_tokens: 800
    timeout: 400.0
    base_url: http://localhost:8000
    seed: null

economics:
  # 6 sellers, asymmetric. With $80/day fixed cost, runway is 30-44 days
  # at zero revenue — agents have to actually sell to survive past month 1.
  seller_starting_cash: [3500.0, 3200.0, 3000.0, 2800.0, 2600.0, 2400.0]
  seller_starting_factories: 1
  buyer_starting_cash: 4500.0
  buyer_daily_production_cap: 5
  factory_build_cost: 2000.0
  factory_build_days: 3
  bankruptcy_threshold: 0.0
  final_good_base_price_excellent: 52.0
  final_good_base_price_poor: 25.0
  starting_widgets_per_seller: 8
  production_defect_rate: 0.07

# Submitter overrides this per arm.
protocol:
  system: no_protocol

prompts:
  style: full
  anchor_stance: honest

agents:
  sellers:
    - name: "Meridian Manufacturing"
    - name: "Aldridge Industrial"
    - name: "Crestline Components"
    - name: "Vector Works"
    - name: "Hartwell Industries"
    - name: "Bellweather Trading"
  buyers:
    - name: "Halcyon Assembly"
    - name: "Pinnacle Goods"
    - name: "Coastal Fabrication"
    - name: "Northgate Systems"
    - name: "Greendale Manufacturing"
    - name: "Lakemont Works"
