# long_horizon_d11_resume_test.yaml — focused checkpoint/resume validation.
#
# 5-day Qwen 32B run, submitted as a 2-job dependency chain at 2h walltime
# each. The first job will hit walltime mid-run, SIGTERM at the 180s grace
# fires the engine's checkpoint-and-exit handler, the second job's engine
# startup calls try_resume() and continues from the latest checkpoint to
# day 5.
#
# checkpoint_interval=1 ensures a snapshot exists at every day boundary so
# the resume path is exercised with high probability regardless of when
# walltime hits.

run:
  days: 5
  strategic_tier_days: [1]
  inactivity_nudge_threshold: 2
  max_parallel_llm_calls: 3
  max_sub_rounds: 0
  fulfillment_phase: true
  multi_round_negotiation: true
  max_negotiation_rounds: 4
  checkpoint_interval: 1

models:
  strategic:
    provider: ollama
    model: qwen2.5:32b
    temperature: 0.7
    max_tokens: 1000
    timeout: 600.0
    seed: null
  tactical:
    provider: ollama
    model: qwen2.5:32b
    temperature: 0.7
    max_tokens: 800
    timeout: 400.0
    seed: null

economics:
  seller_starting_cash: [7500.0, 6500.0, 5500.0, 5000.0, 5000.0, 5000.0]
  seller_starting_factories: 1
  buyer_starting_cash: 6000.0
  buyer_daily_production_cap: 3
  factory_build_cost: 2000.0
  factory_build_days: 3
  bankruptcy_threshold: -2000.0
  final_good_base_price_excellent: 42.0
  final_good_base_price_poor: 38.0
  starting_widgets_per_seller: 8
  production_defect_rate: 0.30

protocol:
  system: no_protocol

prompts:
  style: full
  anchor_stance: honest

agents:
  sellers:
    - name: "Meridian Manufacturing"
    - name: "Aldridge Industrial"
    - name: "Crestline Components"
    - name: "Vector Works"
    - name: "Hartwell Industries"
    - name: "Bellweather Trading"
  buyers:
    - name: "Halcyon Assembly"
    - name: "Pinnacle Goods"
    - name: "Coastal Fabrication"
    - name: "Northgate Systems"
    - name: "Greendale Manufacturing"
    - name: "Lakemont Works"
